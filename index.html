<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Prachi Patel Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
scroll-behavior:smooth;
}

body{
font-family:'Inter',sans-serif;
background:#f6f4f1;
color:#111;
transition:0.4s ease;
overflow-x:hidden;
}

body.dark{
background:#0f0f0f;
color:#f2f2f2;
}

img{
width:100%;
display:block;
}

a{
text-decoration:none;
color:inherit;
}

header{
position:fixed;
top:0;
left:0;
width:100%;
padding:28px 50px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(246,244,241,0.85);
backdrop-filter:blur(12px);
z-index:1000;
transition:0.4s ease;
}

body.dark header{
background:rgba(15,15,15,0.85);
}

.logo-wrap{
display:flex;
align-items:center;
gap:14px;
}

.logo-wrap img{
width:42px;
height:42px;
object-fit:contain;
}

.logo{
font-size:32px;
letter-spacing:5px;
font-family:'Cormorant Garamond',serif;
}

nav{
display:flex;
align-items:center;
gap:30px;
}

nav a{
font-size:15px;
transition:0.3s;
}

nav a:hover{
opacity:0.6;
}

.toggle-btn{
padding:10px 18px;
border:1px solid #111;
border-radius:30px;
background:none;
cursor:pointer;
font-size:14px;
transition:0.4s ease;
}

body.dark .toggle-btn{
border:1px solid #fff;
color:#fff;
}

.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:0 20px;
}

.hero h1{
font-size:110px;
font-weight:300;
font-family:'Cormorant Garamond',serif;
line-height:0.9;
animation:fadeUp 1.4s ease;
}

.hero p{
margin-top:20px;
font-size:18px;
opacity:0.75;
animation:fadeUp 1.8s ease;
}

.gallery{
padding:80px 30px;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:22px;
}

.gallery img{
height:500px;
object-fit:cover;
transition:0.6s ease;
opacity:0;
transform:translateY(40px);
animation:fadeReveal 1s forwards;
}

.gallery img:hover{
transform:scale(1.02);
}

.about{
padding:180px 20px 120px;
max-width:900px;
margin:auto;
text-align:center;
}

.about h2{
font-size:70px;
font-family:'Cormorant Garamond',serif;
font-weight:400;
margin-bottom:30px;
}

.about p{
font-size:17px;
line-height:2;
opacity:0.85;
}

footer{
padding:120px 40px 60px;
text-align:center;
}

.contact a{
font-size:15px;
border-bottom:1px solid currentColor;
padding-bottom:3px;
transition:0.3s ease;
}

.contact a:hover{
opacity:0.6;
}

footer p{
margin-top:40px;
font-size:13px;
opacity:0.6;
}

.fade-section{
opacity:0;
transform:translateY(50px);
transition:all 1s ease;
}

.fade-section.visible{
opacity:1;
transform:translateY(0);
}

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(30px);
}
to{
opacity:1;
transform:translateY(0);
}
}

@keyframes fadeReveal{
to{
opacity:1;
transform:translateY(0);
}
}

@media(max-width:768px){

header{
padding:22px 20px;
}

.hero h1{
font-size:58px;
}

.about h2{
font-size:48px;
}

.gallery{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="logo-wrap">

<img src="pp-logo.png" alt="PP Logo">

<div class="logo">PRACHI PATEL</div>

</div>

<nav>
<button class="toggle-btn" onclick="toggleDark()">Dark</button>

<a href="#work">Work</a>
<a href="#about">About</a>
</nav>

</header>

<section class="hero fade-section">

<div>

<h1>
Architectural<br>
Photography
</h1>

<p>
New York City · Texture · Structure · Atmosphere
</p>

</div>

</section>

<section class="gallery fade-section" id="work">

<img src="IMG_2897.jpeg">
  <img src="IMG_2898.jpeg">
  <img src="IMG_2899.jpeg">
  <img src="IMG_2900.jpeg">
  <img src="IMG_3067 2.jpeg">
  <img src="IMG_3300.jpeg">
  <img src="IMG_3395.jpeg">
  <img src="IMG_3639.jpeg">
  <img src="IMG_3640.jpeg">
  <img src="IMG_4103(2).jpeg">
  <img src="building-1.jpeg">
  <img src='building-2.jpeg">
</section>

<section class="about fade-section" id="about">

<h2>About</h2>

<p>
I’m Prachi Patel, a New York-based designer and photographer exploring the relationship between architecture, visual systems, and digital experience. My background in computer science, graphic design, and photography informs my interest in interaction, structure, rhythm, and urban observation. Currently completing a B.A. in Computer Science with a minor in Graphic Design at Pace University in New York City.
</p>

</section>

<footer>

<div class="contact">

<a href="https://mail.google.com/mail/?view=cm&fs=1&to=patelprachi670@gmail.com" target="_blank">
patelprachi670@gmail.com
</a>

</div>

<p>
© 2026 Prachi Patel · New York City
</p>

</footer>

<script>

function toggleDark(){
document.body.classList.toggle("dark");
}

const sections = document.querySelectorAll('.fade-section');

window.addEventListener('scroll', () => {
sections.forEach(section => {
const sectionTop = section.getBoundingClientRect().top;

if(sectionTop < window.innerHeight - 100){
section.classList.add('visible');
}
});
});

</script>

</body>
</html>
